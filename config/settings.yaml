# Climate Intelligence Copilot Configuration

# LLM Configuration
llm:
  provider: "openai"  # options: openai, anthropic, ollama
  model: "gpt-5.4-nano"
  temperature: 0.7
  max_tokens: 2048
  api_key: "${OPENAI_API_KEY}"

# Google Earth Engine Configuration
gee:
  enabled: true
  project_id: "${GEE_PROJECT_ID}"
  service_account_path: "${GEE_SERVICE_ACCOUNT_PATH}"
  service_account_email: "${GEE_SERVICE_ACCOUNT_EMAIL}"
  
# Sentinel-2 Configuration
sentinel:
  username: "${SENTINEL_USERNAME}"
  password: "${SENTINEL_PASSWORD}"
  api_url: "https://scihub.copernicus.eu/dhus"
  download_dir: "./data/sentinel"
  max_cloud_cover: 20
  side_length_km: 25
  lookback_days: 45
  
# Hyperspectral Configuration
hyperspectral:
  enabled: true
  data_dir: "./data/hyperspectral"
  band_selection: [10, 30, 50]
  rgb_mode: "band_selection"  # options: band_selection, pca
  signature_sample_fraction: 0.02

# External Data Sources
data_sources:
  edgar:
    enabled: true
    csv_path: "./data/external/edgar_country_totals.csv"
    country_column: "country"
    year_column: "year"
    value_column: "total_emissions_mtco2e"
    sector_column: null
  cams:
    enabled: false
    dataset: "cams-global-ghg-reanalysis-eghg"
    api_url: "${CAMS_API_URL}"
    api_key: "${CAMS_API_KEY}"
    cache_dir: "./data/cams"
    variables:
      - "co2_surface_flux"
  gbif:
    enabled: true
    user_agent: "climate-intel-copilot/1.0"
    taxon_key: null
  
# Database & Storage
database:
  type: "sqlite"  # options: sqlite, postgresql
  path: "./data/climate_copilot.db"
  
vector_db:
  type: "faiss"
  index_path: "./data/faiss_index"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  
# Agent Configuration
agents:
  satellite:
    model: "resnet50"
    pretrained: true
    device: "cpu"  # options: cuda, cpu
    confidence_threshold: 0.7
    
  data:
    cache_enabled: true
    cache_dir: "./data/cache"
    timeout: 300
    
  reasoning:
    model: "gpt-5.4-nano"
    temperature: 0.5
    
  policy:
    use_llm: true
    rule_based_fallback: true

# Geospatial Settings
geospatial:
  default_crs: "EPSG:4326"
  resolution: 10  # meters for Sentinel-2
  worker_threads: 4

# Logging
logging:
  level: "INFO"
  format: "json"
  log_dir: "./logs"

# Cache Settings
cache:
  enabled: true
  ttl: 3600  # seconds
  backend: "disk"  # options: disk, redis

# Advanced Features
features:
  explainability:
    enabled: true
    method: "grad-cam"  # options: grad-cam, saliency, attention
  
  time_series_analysis: true
  change_detection: true
